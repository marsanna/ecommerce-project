services:
  mongodb:
    image: mongo:4.4
    # image: mongo:7.0
    # image: mongo:lastest
    container_name: shop-db-dev
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - shop-network

  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile.dev
    container_name: shop-backend-dev
    image: shop-backend:dev
    restart: always
    ports:
      - "8080:3000"
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env.development.local
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - shop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile.dev
    container_name: shop-frontend-dev
    image: shop-frontend:dev
    restart: always
    ports:
      - "80:5173"
    env_file:
      - ./frontend/.env.development.local
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - shop-network

networks:
  shop-network:
    driver: bridge

volumes:
  mongo-data:
